name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.10-alpine
        env:
          POSTGRES_USER: yuansu_test
          POSTGRES_PASSWORD: local_ci_only
          POSTGRES_DB: yuansu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yuansu_test -d yuansu_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://yuansu_test:local_ci_only@localhost:5432/yuansu_test
      TEST_DATABASE_URL: postgresql://yuansu_test:local_ci_only@localhost:5432/yuansu_test
      AUTH_PROVIDER: local
      AUTH_LOCAL_ENABLED: "true"
      AUTH_SECRET: ci_only_auth_secret_at_least_24_chars
      AUTH_LOCAL_OUTBOX_PATH: .local/test-auth-outbox.jsonl
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
