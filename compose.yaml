name: yuansu-local

services:
  postgres:
    image: postgres:16.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yuansu_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_only_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-yuansu_local}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - yuansu_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yuansu_local} -d ${POSTGRES_DB:-yuansu_local}"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  yuansu_postgres_data:
